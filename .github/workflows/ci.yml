name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: occ-code-quality-api
  ECS_CLUSTER: occ-code-quality
  ECS_SERVICE: occ-api-service
  ECS_TASK_DEFINITION: occ-code-quality-api
  S3_BUCKET: occ-code-quality-frontend
  AI_INTEGRATIONS_ENABLED: "true"
  AI_PROVIDERS: '["openrouter"]'
  AI_OPENROUTER_MODEL: openai/gpt-oss-120b:free
  AI_OPENROUTER_API_KEY: ${{ secrets.AI_OPENROUTER_API_KEY }}
  AI_OPENROUTER_HTTP_REFERER: ${{ secrets.AI_OPENROUTER_HTTP_REFERER }}
  AI_OPENROUTER_APP_TITLE: OCC-Code-Quality-CI

jobs:
  # ──────────────── CI: Test & Lint ────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run linting
        run: flake8 app/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Run tests
        run: pytest tests/ -q --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t code-quality-gate .

  quality-gate:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenRouter secret availability
        run: |
          if [ -z "${AI_OPENROUTER_API_KEY}" ]; then
            echo "::warning::AI_OPENROUTER_API_KEY is empty in this run."
            echo "::warning::If you are using Environment secrets, bind this job to that environment."
          else
            echo "OpenRouter API key detected (length: ${#AI_OPENROUTER_API_KEY})"
          fi

      - name: Build and start API
        env:
          AI_INTEGRATIONS_ENABLED: ${{ env.AI_INTEGRATIONS_ENABLED }}
          AI_PROVIDERS: ${{ env.AI_PROVIDERS }}
          AI_OPENROUTER_API_KEY: ${{ env.AI_OPENROUTER_API_KEY }}
          AI_OPENROUTER_MODEL: ${{ env.AI_OPENROUTER_MODEL }}
          AI_OPENROUTER_HTTP_REFERER: ${{ env.AI_OPENROUTER_HTTP_REFERER }}
          AI_OPENROUTER_APP_TITLE: ${{ env.AI_OPENROUTER_APP_TITLE }}
        run: |
          if [ -z "${AI_OPENROUTER_API_KEY}" ]; then
            echo "AI integrations disabled for this run because API key is unavailable."
            export AI_INTEGRATIONS_ENABLED=false
          fi
          docker compose up -d api
          sleep 10

      - name: Run quality gate on sample files
        run: |
          for file in sample_files/*.py; do
            if [ -f "$file" ]; then
              echo "Analyzing: $file"
              curl -s -X POST http://localhost:8000/api/v1/analyze/file \
                -F "file=@$file" -F "threshold=6.0" | python -m json.tool
            fi
          done

      - name: Stop API
        if: always()
        run: docker compose down

  # ──────────────── CD: Deploy Backend to ECS ────────────────
  deploy-backend:
    needs: quality-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: update-taskdef
        env:
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          # Fetch the current task definition and swap the image only
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          new_image = '$IMAGE'
          td['containerDefinitions'][0]['image'] = new_image
          # Strip read-only fields before re-registering
          for field in ('taskDefinitionArn','revision','status','requiresAttributes',
                        'compatibilities','registeredAt','registeredBy','deregisteredAt'):
              td.pop(field, None)
          print(json.dumps(td))
          ")

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered new task definition: $NEW_ARN"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.update-taskdef.outputs.task_def_arn }} \
            --force-new-deployment

      - name: Wait for ECS service to stabilize
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
          echo "Deployment complete!"

  # ──────────────── CD: Deploy Frontend to S3 ────────────────
  deploy-frontend:
    needs: quality-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.BACKEND_URL }}
        run: |
          echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" > .env
          npm run build

      - name: Deploy to S3
        working-directory: frontend
        run: aws s3 sync dist/ s3://$S3_BUCKET --delete
